# =============================================================================
# LLM Self-Hosting Deployment Configuration
# Based on: EC2 + vLLM + LangChain + FastAPI + GPTCache
# =============================================================================

# ---------------- HuggingFace Model Settings ---------------------------------
HF_MODEL_ID="tiiuae/falcon-7b-instruct"   # HuggingFace model repo ID
HF_TOKEN=""                                # Optional: HF token for gated models
TRUST_REMOTE_CODE=true                     # Required for many HF models

# ---------------- LLM Generation Parameters ----------------------------------
MAX_NEW_TOKENS=50
TEMPERATURE=0.6
TENSOR_PARALLEL_SIZE=1                     # Set to number of GPUs (e.g. 4 for g5.12xlarge)

# ---------------- FastAPI Server Settings ------------------------------------
API_HOST="0.0.0.0"
API_PORT=5001
APP_DIR="/home/ubuntu/llm_app"             # Directory where Python app files are placed
LOG_FILE="/var/log/llm_api.log"

# ---------------- LLM Caching ------------------------------------------------
ENABLE_CACHE=true                          # true = use GPTCache, false = no cache
CACHE_TYPE="map"                           # Options: map | redis (map = in-process file-backed)
CACHE_DIR="/home/ubuntu/llm_cache"         # Directory to store cache data

# Redis settings (only used when CACHE_TYPE=redis)
REDIS_HOST="localhost"
REDIS_PORT=6379
REDIS_PASSWORD=""

# ---------------- Nginx Reverse Proxy ----------------------------------------
ENABLE_NGINX=true                          # Forward port 80 → API_PORT
NGINX_SERVER_NAME="_"                      # Use "_" to match any hostname, or set your domain

# ---------------- Python / Pip -----------------------------------------------
PYTHON_BIN="python3"
PIP_BIN="pip3"

# ---------------- Systemd Service --------------------------------------------
SERVICE_NAME="llm-api"
SERVICE_USER="ubuntu"
